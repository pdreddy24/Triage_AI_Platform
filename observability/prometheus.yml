global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:

  - job_name: "fraud-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["fraud-api:8000"]

  - job_name: "scoring-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["scoring-service:8001"]

  - job_name: "graph-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["graph-service:8002"]