version: "3.9"

services:

  api:
    build: .
    container_name: fraud-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://fraud:fraud@postgres:5432/frauddb
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    container_name: fraud-worker
    command: celery -A app.tasks.worker worker --loglevel=info
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://fraud:fraud@postgres:5432/frauddb
      - REDIS_URL=redis://redis:6379/0

  postgres:
    image: postgres:15
    container_name: fraud-postgres
    restart: always
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: frauddb
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: fraud-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    container_name: fraud-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: fraud-grafana
    ports:
      - "3000:3000"